name: Alastyr'a Yayinla (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: FTP ile senkronize et
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          timeout: 60000
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .gitignore
            _kaynak/**
            README.md
            Tavuk Çadırı Logo.png
